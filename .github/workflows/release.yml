name: Release Dev Build

on:
  push:
    branches: [master]
    paths-ignore: ['pluginmaster.json']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build
        run: dotnet build FroggePlugin/FroggePlugin.csproj --configuration Release -p:Version=0.0.0.${{ github.run_number }}

      - name: Package release zip
        run: Copy-Item "FroggePlugin\bin\Release\FroggePlugin\latest.zip" "FroggePlugin.zip"

      - name: Create GitHub Release
        run: gh release create "build-${{ github.run_number }}" FroggePlugin.zip --title "Dev build ${{ github.run_number }}" --notes "Automated dev-testing build."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update pluginmaster.json
        run: |
          $json = Get-Content pluginmaster.json | ConvertFrom-Json
          $json[0].AssemblyVersion = "0.0.0.${{ github.run_number }}"
          $json[0].LastUpdate = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds().ToString()
          $json | ConvertTo-Json -Depth 5 | Set-Content pluginmaster.json

      - name: Commit pluginmaster.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "Bump pluginmaster.json to build ${{ github.run_number }}"
          git push
